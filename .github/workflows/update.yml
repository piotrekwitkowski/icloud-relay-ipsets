name: Update iCloud Private Relay IP Sets

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Update IP sets
        run: python update.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ipv4.txt ipv6.txt all.txt README.md
          git diff --cached --quiet || (git commit -m "Update iCloud Private Relay IP sets $(date -u +%Y-%m-%d)" && git push)
